<!-- Leaflet JS & CSS -->
<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>EmpowerAble - Premium Accessibility Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/navbar-standard.css">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0a3622",
                        "accent-gold": "#d4af37",
                        "background-light": "#E8fac2",
                        "background-dark": "#051a10",
                    },
                },
            },
        }
    </script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <style>
        body {
            font-family: 'Public Sans', sans-serif;
            background-color: #E8fac2;
            margin: 0;
            overflow: hidden;
        }

        #map {
            height: 100%;
            width: 100%;
            z-index: 1;
        }

        .active-route {
            transition: all 0.5s ease;
        }

        .emergency-route {
            stroke-dasharray: 10, 10;
            animation: dash 1s linear infinite;
        }

        @keyframes dash {
            to {
                stroke-dashoffset: -20;
            }
        }

        .rating-badge {
            padding: 4px 12px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
        }

        .rating-green {
            background: #dcfce7;
            color: #166534;
        }

        .rating-yellow {
            background: #fef9c3;
            color: #854d0e;
        }

        .rating-red {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>

<body class="bg-background-light text-primary min-h-screen">
    <div class="flex h-screen w-full flex-col overflow-hidden pt-[80px]">
        <nav class="navbar" id="navbar">
            <div class="navbar__container">
                <a href="/" class="navbar__logo">
                    <span class="navbar__logo-empower">Empower</span><span class="navbar__logo-able">Able</span>
                </a>
                <ul class="navbar__links">
                    <li><a href="/" class="navbar__link">Home</a></li>
                    <li><a href="/map.html" class="navbar__link">Explore Map</a></li>
                    <li><a href="/community.html" class="navbar__link">Community</a></li>
                    <li><a href="/ai-support.html" class="navbar__link">AI Support</a></li>
                    <li><a href="/profile.html" class="navbar__link">Profile</a></li>
                    <li><a href="/pricing.html" class="navbar__link">Pricing</a></li>
                </ul>
            </div>
        </nav>
        <main class="flex flex-1 overflow-hidden relative">
            <section class="flex-1 relative">
                <!-- Floating Controls Container -->
                <div class="absolute top-6 left-6 z-[1000] flex flex-col gap-4">

                    <!-- Routing Controls -->
                    <div class="bg-white/95 backdrop-blur-sm rounded-2xl shadow-2xl p-4 border border-primary/10 w-80">
                        <div class="space-y-3">
                            <h3
                                class="text-xs font-bold text-primary/40 uppercase tracking-widest mb-2 flex items-center gap-2">
                                <span class="material-symbols-outlined !text-sm">navigation</span> Accessible Routing
                            </h3>
                            <div class="relative">
                                <label class="text-[10px] font-bold text-primary/40 uppercase mb-1 block">From</label>
                                <input type="text" id="start-node"
                                    class="w-full bg-slate-50 border-none rounded-lg px-3 py-2 text-sm font-medium"
                                    placeholder="Search start location...">
                                <div id="start-results"
                                    class="absolute top-full left-0 right-0 bg-white shadow-xl rounded-lg hidden z-10 max-h-40 overflow-y-auto mt-1">
                                </div>
                            </div>
                            <div class="relative">
                                <label class="text-[10px] font-bold text-primary/40 uppercase mb-1 block">To</label>
                                <input type="text" id="end-node"
                                    class="w-full bg-slate-50 border-none rounded-lg px-3 py-2 text-sm font-medium"
                                    placeholder="Search destination...">
                                <div id="end-results"
                                    class="absolute top-full left-0 right-0 bg-white shadow-xl rounded-lg hidden z-10 max-h-40 overflow-y-auto mt-1">
                                </div>
                            </div>
                            <button id="btn-route"
                                class="w-full bg-primary text-white font-bold py-2.5 rounded-xl hover:shadow-lg transition-all flex items-center justify-center gap-2">
                                <span class="material-symbols-outlined !text-lg">directions</span>
                                Get Accessible Path
                            </button>
                            <div class="flex items-center justify-between pt-2 border-t">
                                <span class="text-xs font-bold text-primary/60">Emergency Mode</span>
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" id="emergency-toggle" class="sr-only peer">
                                    <div
                                        class="w-9 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-red-500">
                                    </div>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right Controls -->
                <div class="absolute top-6 right-6 flex flex-col gap-2 z-[1000]">
                    <button id="btn-live"
                        class="size-12 rounded-2xl bg-white shadow-lg text-primary hover:bg-primary hover:text-white transition-all flex items-center justify-center"
                        title="Go to my location">
                        <span class="material-symbols-outlined">my_location</span>
                    </button>
                    <button id="btn-reset" onclick="location.reload()"
                        class="size-12 rounded-2xl bg-white shadow-lg text-primary hover:bg-primary hover:text-white transition-all flex items-center justify-center"
                        title="Reset map">
                        <span class="material-symbols-outlined">refresh</span>
                    </button>
                </div>

                <!-- Search Bar: centered between sidebar (left) and right buttons -->
                <div class="absolute top-6 left-[320px] right-[80px] z-[1500] flex justify-center items-start">
                    <div
                        class="relative bg-white/95 backdrop-blur-md rounded-2xl shadow-2xl flex items-center px-4 py-3 border border-white/50 w-full max-w-md gap-2">
                        <span class="material-symbols-outlined text-primary/40 text-xl shrink-0">search</span>
                        <input type="text" id="map-search"
                            class="flex-1 bg-transparent border-none outline-none text-primary font-medium text-sm placeholder:text-slate-400"
                            placeholder="Search any location or area...">
                        <div id="search-results"
                            class="absolute top-full left-0 right-0 bg-white shadow-2xl rounded-2xl hidden z-[3000] max-h-72 overflow-y-auto mt-2 border border-slate-100">
                        </div>
                    </div>
                </div>

                <div id="map"></div>
            </section>
        </main>
    </div>

    <script src="/navbar-standard.js"></script>
    <script>
        let map, currentRoute;
        let startCoords, endCoords;

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([47.3769, 8.5417], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);

            L.control.zoom({ position: 'bottomright' }).addTo(map);

            // Fetch Accessibility on Click
            map.on('click', async (e) => {
                const { lat, lng } = e.latlng;
                const response = await fetch(`/api/accessibility?lat=${lat}&lng=${lng}`);
                const data = await response.json();

                // Generate random premium rating/zone
                const randomRating = Math.floor(Math.random() * (98 - 85 + 1)) + 85;
                const zones = ['Green', 'Blue', 'Safe'];
                const randomZone = zones[Math.floor(Math.random() * zones.length)];

                const popupHtml = `
                    <div class="p-4 min-w-[280px] font-sans">
                        <div class="flex items-center justify-between mb-4">
                            <h4 class="font-extrabold text-[#0a3622] text-lg leading-tight truncate mr-2" style="max-width: 180px;">${data.name || 'Location info'}</h4>
                            <div class="bg-emerald-100 text-emerald-700 px-2 py-1 rounded-lg flex items-center gap-1 shrink-0">
                                <span class="text-xs font-black">${randomRating}</span>
                                <span class="material-symbols-outlined !text-[12px]">verified_user</span>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-2 mb-4">
                            <div class="bg-slate-50 p-2 rounded-xl text-center">
                                <p class="text-[9px] font-bold text-slate-400 uppercase">Accessibility</p>
                                <p class="text-xs font-black text-emerald-600">${data.rating.toUpperCase()}</p>
                            </div>
                            <div class="bg-slate-50 p-2 rounded-xl text-center">
                                <p class="text-[9px] font-bold text-slate-400 uppercase">Safety Zone</p>
                                <p class="text-xs font-black text-blue-600">${randomZone}</p>
                            </div>
                        </div>

                        <div class="space-y-1.5 mb-5 max-h-32 overflow-y-auto pr-1">
                            ${Object.entries(data.features).map(([key, val]) => `
                                <div class="flex items-center justify-between px-2 py-1 bg-slate-50/50 rounded-lg">
                                    <span class="capitalize text-[10px] font-bold text-primary/70">${key.replace('_', ' ')}</span>
                                    <span class="material-symbols-outlined !text-[14px] ${val ? 'text-emerald-500' : 'text-slate-300'}">
                                        ${val ? 'check_circle' : 'cancel'}
                                    </span>
                                </div>
                            `).join('')}
                        </div>

                        <div class="flex flex-col gap-2">
                             <div class="flex gap-2">
                                 <button onclick="setPoint('start', ${lat}, ${lng}, '${data.name}')" class="flex-1 text-[11px] font-black bg-slate-100 text-slate-700 py-2.5 rounded-xl hover:bg-slate-200 transition-all">Set Start</button>
                                 <button onclick="setPoint('end', ${lat}, ${lng}, '${data.name}')" class="flex-1 text-[11px] font-black bg-primary text-white py-2.5 rounded-xl hover:shadow-lg transition-all">Set Destination</button>
                             </div>
                             <button onclick="alert('Thank you for reporting. Our team will verify this location.')" class="w-full text-[11px] font-bold text-red-500 bg-red-50 py-2 rounded-xl border border-red-100/50 hover:bg-red-100 transition-all">Report Infrastructure Issue</button>
                        </div>
                    </div>
                `;
                L.popup({ className: 'custom-premium-popup' }).setLatLng(e.latlng).setContent(popupHtml).openOn(map);
            });

            // Normal Search
            setupSearch('map-search', 'search-results', (coords, name) => {
                map.setView([coords[1], coords[0]], 16);
                L.marker([coords[1], coords[0]]).addTo(map).bindPopup(name).openPopup();
                // Set as end coords by default for routing convenience
                endCoords = coords;
                document.getElementById('end-node').value = name;
            });

            setupSearch('start-node', 'start-results', (coords, name) => {
                startCoords = coords;
                document.getElementById('start-node').value = name;
                console.log("Start Coords set:", startCoords);
            });
            setupSearch('end-node', 'end-results', (coords, name) => {
                endCoords = coords;
                document.getElementById('end-node').value = name;
                console.log("End Coords set:", endCoords);
            });

            document.getElementById('btn-route').onclick = calculateRoute;
            document.getElementById('btn-live').onclick = () => {
                map.locate({ setView: true, maxZoom: 16 });
            };
            map.on('locationfound', (e) => {
                startCoords = [e.latlng.lng, e.latlng.lat];
                document.getElementById('start-node').value = "My Location";
                // Add a pulse marker for my location
                L.marker(e.latlng, {
                    icon: L.divIcon({
                        className: 'live-location-marker',
                        html: '<div class="w-4 h-4 bg-blue-500 rounded-full border-2 border-white shadow-lg animate-pulse" style="margin-top:-8px; margin-left:-8px;"></div>',
                        iconSize: [16, 16]
                    })
                }).addTo(map);
                L.circle(e.latlng, e.accuracy).addTo(map);
            });
        }

        function setPoint(type, lat, lng, name) {
            if (type === 'start') {
                startCoords = [lng, lat];
                document.getElementById('start-node').value = name;
            } else {
                endCoords = [lng, lat];
                document.getElementById('end-node').value = name;
            }
            map.closePopup();
        }

        function setupSearch(inputId, resultsId, onSelect) {
            const input = document.getElementById(inputId);
            const res = document.getElementById(resultsId);
            let timeout;

            input.oninput = () => {
                clearTimeout(timeout);
                if (input.value.length < 3) return res.classList.add('hidden');
                timeout = setTimeout(async () => {
                    const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${input.value}`);
                    const data = await response.json();
                    res.innerHTML = data.map(i => `
                        <div class="p-2 border-b last:border-0 hover:bg-slate-50 cursor-pointer text-xs font-medium" 
                             onclick="selectPlace('${inputId}', '${resultsId}', ${i.lat}, ${i.lon}, '${i.display_name.split(',')[0]}')">
                            ${i.display_name}
                        </div>
                    `).join('');
                    res.classList.remove('hidden');
                }, 300);
            };

            window.selectPlace = (id, rid, lat, lon, name) => {
                const coords = [lon, lat];
                onSelect(coords, name);

                // Explicitly update global coords based on input ID to be safe
                if (id === 'start-node') startCoords = coords;
                if (id === 'end-node') endCoords = coords;
                if (id === 'map-search') endCoords = coords;

                document.getElementById(rid).classList.add('hidden');
                console.log(`Updated ${id} with coords:`, coords);
            };
        }

        async function calculateRoute() {
            if (!startCoords || !endCoords) return alert("Please set both start and destination points.");

            const isEmergency = document.getElementById('emergency-toggle').checked;

            try {
                const response = await fetch('http://localhost:3001/api/route', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ start: startCoords, end: endCoords, emergency: isEmergency })
                });
                const data = await response.json();

                if (currentRoute) map.removeLayer(currentRoute);

                const coordinates = data.features[0].geometry.coordinates.map(c => [c[1], c[0]]);
                currentRoute = L.polyline(coordinates, {
                    color: isEmergency ? '#ef4444' : '#3b82f6',
                    weight: isEmergency ? 8 : 5,
                    opacity: 0.8,
                    className: isEmergency ? 'emergency-route' : ''
                }).addTo(map);

                map.fitBounds(currentRoute.getBounds(), { padding: [50, 50] });
            } catch (err) {
                console.error(err);
                alert("Routing failed. Ensure backend is running and ORS key is valid.");
            }
        }

        window.onload = initMap;
    </script>
</body>

</html>
